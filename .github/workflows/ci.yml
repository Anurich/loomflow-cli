name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      # The suite is offline by design (model="echo", tmp-path fixtures,
      # no API keys). Sandbox kernel tests self-skip on hosts without
      # Seatbelt / bubblewrap.
      - name: Test
        run: python -m pytest -q
