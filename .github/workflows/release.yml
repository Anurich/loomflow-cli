name: Release to PyPI

on:
  push:
    tags:
      - "v*"

# Trusted publishing (same setup as the loomflow repo) — no API
# token stored anywhere. Configure the PyPI project to trust this
# workflow at: https://pypi.org/manage/account/publishing/
#   PyPI project : loom-code
#   Owner        : Anurich
#   Repository   : loomflow-cli
#   Workflow     : release.yml

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent: re-tagging an already-published version is a
          # no-op instead of a failed workflow.
          skip-existing: true
